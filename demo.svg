<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="'Cascadia Code', 'Fira Code', 'Courier New', monospace" font-size="14">
  <!-- Terminal window -->
  <rect width="800" height="500" rx="10" fill="#1e1e2e"/>

  <!-- Title bar -->
  <rect width="800" height="40" rx="10" fill="#313244"/>
  <rect y="30" width="800" height="10" fill="#313244"/>

  <!-- Traffic lights -->
  <circle cx="20" cy="20" r="7" fill="#f38ba8"/>
  <circle cx="44" cy="20" r="7" fill="#fab387"/>
  <circle cx="68" cy="20" r="7" fill="#a6e3a1"/>

  <!-- Title -->
  <text x="400" y="25" text-anchor="middle" fill="#cdd6f4" font-size="13" opacity="0.7">FoundryAI — Claude Code</text>

  <!-- Line 1: prompt + command -->
  <text x="20" y="75" fill="#a6e3a1">$</text>
  <text x="34" y="75" fill="#cdd6f4">
    <tspan>claude</tspan>
  </text>

  <!-- Line 2: blank -->

  <!-- Line 3: user types -->
  <text x="20" y="110" fill="#89b4fa" opacity="0">
    Use the founder agent to build a RAG-powered document search.
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.08;0.12;1" dur="12s" repeatCount="indefinite"/>
  </text>

  <!-- Founder agent activates -->
  <text x="20" y="145" fill="#cba6f7" font-weight="bold" opacity="0">
    ◆ founder agent activated
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.18;0.22;1" dur="12s" repeatCount="indefinite"/>
  </text>
  <text x="20" y="165" fill="#6c7086" opacity="0">
    Analyzing request... routing to specialist team
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.22;0.26;1" dur="12s" repeatCount="indefinite"/>
  </text>

  <!-- Routing -->
  <text x="20" y="200" fill="#f9e2af" font-weight="bold" opacity="0">
    ROUTING → 3 specialists in parallel
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.28;0.32;1" dur="12s" repeatCount="indefinite"/>
  </text>

  <!-- Agent 1 -->
  <text x="20" y="230" fill="#89dceb" opacity="0">
    ├── ai-architect        System design + component selection
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.34;0.38;1" dur="12s" repeatCount="indefinite"/>
  </text>

  <!-- Agent 2 -->
  <text x="20" y="252" fill="#89dceb" opacity="0">
    ├── ai-engineer         RAG pipeline + embedding strategy
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.40;0.44;1" dur="12s" repeatCount="indefinite"/>
  </text>

  <!-- Agent 3 -->
  <text x="20" y="274" fill="#89dceb" opacity="0">
    └── ai-finance-engineer Token cost estimate + optimization
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.46;0.50;1" dur="12s" repeatCount="indefinite"/>
  </text>

  <!-- Divider -->
  <line x1="20" y1="295" x2="780" y2="295" stroke="#313244" stroke-width="1" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.52;0.54;1" dur="12s" repeatCount="indefinite"/>
  </line>

  <!-- Output -->
  <text x="20" y="318" fill="#a6e3a1" font-weight="bold" opacity="0">
    ✓ Architecture: Pinecone vector DB + voyage-3 embeddings + hybrid retrieval
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.54;0.58;1" dur="12s" repeatCount="indefinite"/>
  </text>
  <text x="20" y="340" fill="#a6e3a1" font-weight="bold" opacity="0">
    ✓ Pipeline: LangChain chunking → embeddings → Pinecone upsert → RAGAS eval
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.60;0.64;1" dur="12s" repeatCount="indefinite"/>
  </text>
  <text x="20" y="362" fill="#a6e3a1" font-weight="bold" opacity="0">
    ✓ Cost: ~$0.004/query at 100k docs · $380/mo at 10k queries/day · cache saves 60%
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.66;0.70;1" dur="12s" repeatCount="indefinite"/>
  </text>

  <!-- Divider 2 -->
  <line x1="20" y1="383" x2="780" y2="383" stroke="#313244" stroke-width="1" opacity="0">
    <animate attributeName="opacity" values="0;0;0.6;0.6" keyTimes="0;0.72;0.76;1" dur="12s" repeatCount="indefinite"/>
  </line>

  <!-- Footer -->
  <text x="20" y="408" fill="#6c7086" font-size="12" opacity="0">
    38 agents · 25 skills · zero context switching
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.76;0.80;1" dur="12s" repeatCount="indefinite"/>
  </text>
  <text x="20" y="428" fill="#89b4fa" font-size="12" opacity="0">
    github.com/VenkataAnilKumar/FoundryAI
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.80;0.84;1" dur="12s" repeatCount="indefinite"/>
  </text>

  <!-- Blinking cursor -->
  <rect x="20" y="448" width="8" height="16" fill="#cdd6f4">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>
